server:
  port: ${SERVER_PORT:8084}   # 8080=llm-gateway, 8081=llm-rag-pipeline, 8082=llm-chat-agent, 8083=llm-audio, 8084=llm-image
  shutdown: graceful   # drain in-flight requests on SIGTERM (rolling deploys)
  servlet:
    context-path: /ai

spring:
  application:
    name: llm-image
  lifecycle:
    timeout-per-shutdown-phase: 30s   # bound graceful-shutdown drain time
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
      file-size-threshold: 2KB
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:spring_ai_image}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
    baseline-description: existing schema
    table: flyway_schema_history_image

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      show-components: when-authorized
      roles: ACTUATOR
      probes:
        enabled: true
    info:
      enabled: true
  info:
    git:
      mode: full
    build:
      enabled: true
    env:
      enabled: true
    java:
      enabled: true
    os:
      enabled: true
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/traces
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms,100ms,200ms,300ms,500ms,1s,2s,5s

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{requestId}] [%X{traceId}/%X{spanId}] %-5level %logger{36} - %msg%n"
  level:
    root: INFO
    com.org.llm: INFO
    dev.langchain4j: INFO
    org.springframework.web: INFO

resilience4j:
  circuitbreaker:
    instances:
      llm-image:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        minimum-number-of-calls: 5
        register-health-indicator: true
  retry:
    instances:
      llm-image:
        max-attempts: 3
        wait-duration: 500ms
        retry-exceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException

app:
  metadata:
    project-name: LLM Image
    description: LangChain4j image backend — captioning and AI image generation.
    group-id: com.org.llm
    artifact-id: llm-image
    project-version: 0.0.1-SNAPSHOT
    langchain4j-version: 1.16.3
    database: PostgreSQL
  chat:
    model: ${CHAT_MODEL:gpt-4o-mini}
  image:
    model: ${IMAGE_MODEL:dall-e-3}
  # ── Upstream LLM gateway ──────────────────────────────────────────────────────
  gateway:
    enabled: ${GATEWAY_ENABLED:true}             # route image generation via llm-gateway
    base-url: ${GATEWAY_BASE_URL:http://localhost:8080/llm}
    api-key: ${GATEWAY_API_KEY:}                 # only needed if the gateway has auth enabled
    image-model: ${GATEWAY_IMAGE_MODEL:dall-e-3}
    timeout-seconds: 60
  # ── API-key security ──────────────────────────────────────────────────────────
  security:
    auth-enabled: ${API_AUTH_ENABLED:true}     # set false for fully-open local runs
    header: X-API-Key
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}  # comma-separated; empty = no cross-origin browser access
    rate-limit:
      enabled: ${RATE_LIMIT_ENABLED:true}      # token bucket per API key (or client IP)
      capacity: 120                            # burst size
      refill-per-minute: 120                   # sustained requests/min
