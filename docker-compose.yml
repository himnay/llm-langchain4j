services:
  postgres:
    image: postgres:18
    container_name: llm-postgres
    environment:
      POSTGRES_DB: spring_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql   # PG18+ stores data in a versioned subdir; mount the parent
      # Runs once, only when the volume is first initialized — creates the extra per-service
      # databases used by the llm-audio and llm-image modules (llm-chat-agent uses POSTGRES_DB).
      - ./observability/init-db:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d spring_ai" ]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:latest
    container_name: llm-chat-redis
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
  redisinsight: # http://localhost:5540 — add database -> host: redis -> username & password blank
    image: redis/redisinsight:latest
    container_name: llm-chat-redisinsight
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis
    restart: unless-stopped
  tempo:
    image: grafana/tempo:latest
    container_name: llm-chat-tempo
    command: [ "-config.file=/etc/tempo.yml" ]
    restart: unless-stopped
    ports:
      - "3200:3200"   # Tempo HTTP API / Grafana query
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP  ← app sends traces here
    volumes:
      - ./observability/tempo.yml:/etc/tempo.yml:ro
      - tempo-data:/tmp/tempo
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3200/ready || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
  loki:
    image: grafana/loki:latest
    container_name: llm-chat-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/local-config.yaml:ro
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
  prometheus:
    image: prom/prometheus:latest
    container_name: llm-chat-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 5
  grafana:
    image: grafana/grafana:latest
    container_name: llm-chat-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
      - tempo
      - loki

volumes:
  postgres_data:
  redis_data:
  redisinsight_data:
  grafana-data:
  tempo-data:
